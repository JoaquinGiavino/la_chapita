name: la_chapita
description: Gestión de deudores para La Chapita
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.3
  path: ^1.8.3
  path_provider: ^2.1.2
  flutter_riverpod: ^2.4.9
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  phosphor_flutter: ^2.0.0
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  msix: ^3.16.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

msix_config:
  display_name: La Chapita
  publisher_display_name: La Chapita
  identity_name: com.lachapita.app
  msix_version: 1.0.0.0
  logo_path: assets/images/logo.png
  capabilities: internetClient